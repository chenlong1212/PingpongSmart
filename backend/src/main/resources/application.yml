server.port: 8080
spring.application.name: pingpongsmt
logging.level.com.pingpongsmt: INFO

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pingpongsmt?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

pingpong:
  chat:
    history-limit: 20
    context-rounds: 10
